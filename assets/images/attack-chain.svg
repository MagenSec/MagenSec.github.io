<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 260" role="img" aria-label="Attack Chain Diagram — How MagenSec Stops Threats">
  <defs>
    <linearGradient id="dangerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="blockGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      @keyframes arrowFlow {
        0% { stroke-dashoffset: 40; opacity: 0.4; }
        100% { stroke-dashoffset: 0; opacity: 1; }
      }
      @keyframes blockPulse {
        0%, 100% { opacity: 0.8; }
        50% { opacity: 1; filter: url(#softGlow); }
      }
      .chain-arrow { animation: arrowFlow 1.5s ease-in-out infinite alternate; stroke-dasharray: 10 6; }
      .block-badge { animation: blockPulse 2s ease-in-out infinite; }
      @media (prefers-reduced-motion: reduce) {
        .chain-arrow, .block-badge { animation: none; }
      }
    </style>
  </defs>

  <!-- Background -->
  <rect width="900" height="260" fill="#050b18" rx="16"/>

  <!-- Faint grid lines -->
  <line x1="0" y1="130" x2="900" y2="130" stroke="#1e3a5f" stroke-width="1" opacity="0.4"/>

  <!-- ── Stage 1: INITIAL THREAT ─────────────────────────── -->
  <g transform="translate(30, 55)">
    <!-- Box -->
    <rect width="120" height="90" rx="10" fill="#1a0a0a" stroke="#ef4444" stroke-width="1.5"/>
    <!-- Icon: flame/danger -->
    <text x="60" y="40" text-anchor="middle" font-size="28" fill="#ef4444">⚠</text>
    <!-- Label -->
    <text x="60" y="62" text-anchor="middle" fill="#f87171" font-size="11" font-weight="700" font-family="Arial, sans-serif">INITIAL</text>
    <text x="60" y="76" text-anchor="middle" fill="#f87171" font-size="11" font-weight="700" font-family="Arial, sans-serif">THREAT</text>
    <!-- Sub-label -->
    <text x="60" y="104" text-anchor="middle" fill="#64748b" font-size="9" font-family="Arial, sans-serif">Malware • Email • USB</text>
  </g>

  <!-- Arrow 1→2 -->
  <line x1="152" y1="100" x2="188" y2="100" stroke="#ef4444" stroke-width="2" marker-end="url(#arr)" class="chain-arrow" opacity="0.8"/>
  <circle cx="170" cy="100" r="5" fill="#ef4444" opacity="0.5"/>

  <!-- ── Stage 2: VULNERABILITY ─────────────────────────── -->
  <g transform="translate(190, 55)">
    <rect width="120" height="90" rx="10" fill="#1a0f00" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="60" y="40" text-anchor="middle" font-size="28" fill="#f59e0b">🔓</text>
    <text x="60" y="62" text-anchor="middle" fill="#fbbf24" font-size="11" font-weight="700" font-family="Arial, sans-serif">UNPATCHED</text>
    <text x="60" y="76" text-anchor="middle" fill="#fbbf24" font-size="11" font-weight="700" font-family="Arial, sans-serif">VULN</text>
    <text x="60" y="104" text-anchor="middle" fill="#64748b" font-size="9" font-family="Arial, sans-serif">CVE Exploited</text>
  </g>

  <!-- Arrow 2→3 -->
  <line x1="312" y1="100" x2="348" y2="100" stroke="#ef4444" stroke-width="2" class="chain-arrow" opacity="0.8"/>
  <circle cx="330" cy="100" r="5" fill="#ef4444" opacity="0.5"/>

  <!-- ── Stage 3: LATERAL MOVEMENT ─────────────────────── -->
  <g transform="translate(350, 55)">
    <rect width="120" height="90" rx="10" fill="#160816" stroke="#c084fc" stroke-width="1.5"/>
    <text x="60" y="40" text-anchor="middle" font-size="28" fill="#c084fc">↔</text>
    <text x="60" y="62" text-anchor="middle" fill="#d8b4fe" font-size="11" font-weight="700" font-family="Arial, sans-serif">LATERAL</text>
    <text x="60" y="76" text-anchor="middle" fill="#d8b4fe" font-size="11" font-weight="700" font-family="Arial, sans-serif">MOVEMENT</text>
    <text x="60" y="104" text-anchor="middle" fill="#64748b" font-size="9" font-family="Arial, sans-serif">Spreading Silently</text>
  </g>

  <!-- Arrow 3→4 -->
  <line x1="472" y1="100" x2="508" y2="100" stroke="#ef4444" stroke-width="2" class="chain-arrow" opacity="0.8"/>
  <circle cx="490" cy="100" r="5" fill="#ef4444" opacity="0.5"/>

  <!-- ── Stage 4: ENCRYPTION/EXFIL ─────────────────────── -->
  <g transform="translate(510, 55)">
    <rect width="120" height="90" rx="10" fill="#1a0505" stroke="#ef4444" stroke-width="2"/>
    <text x="60" y="40" text-anchor="middle" font-size="28" fill="#ef4444">🔐</text>
    <text x="60" y="62" text-anchor="middle" fill="#fca5a5" font-size="11" font-weight="700" font-family="Arial, sans-serif">RANSOMWARE</text>
    <text x="60" y="76" text-anchor="middle" fill="#fca5a5" font-size="11" font-weight="700" font-family="Arial, sans-serif">ENCRYPT</text>
    <text x="60" y="104" text-anchor="middle" fill="#64748b" font-size="9" font-family="Arial, sans-serif">Files Locked</text>
  </g>

  <!-- ── MAGENSEC SHIELD (Blocking) ───────────────────── -->
  <!-- Shield block indicator -->
  <g transform="translate(660, 30)" class="block-badge">
    <!-- Hex shield -->
    <polygon points="80,5 135,35 135,95 80,125 25,95 25,35" fill="none" stroke="#06b6d4" stroke-width="3" filter="url(#softGlow)"/>
    <polygon points="80,5 135,35 135,95 80,125 25,95 25,35" fill="#0a2040" opacity="0.7"/>
    <!-- Checkmark -->
    <polyline points="50,65 68,85 110,45" stroke="#10b981" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- BLOCKED text -->
    <text x="80" y="148" text-anchor="middle" fill="#06b6d4" font-size="11" font-weight="700" font-family="Arial, sans-serif" letter-spacing="2">BLOCKED</text>
    <text x="80" y="163" text-anchor="middle" fill="#10b981" font-size="10" font-family="Arial, sans-serif">by MagenSec</text>
  </g>

  <!-- Block arrows (from each stage pointing down to MagenSec) -->
  <line x1="90"  y1="145" x2="90"  y2="200" stroke="#10b981" stroke-width="1" stroke-dasharray="4 4" opacity="0.4"/>
  <line x1="250" y1="145" x2="250" y2="200" stroke="#10b981" stroke-width="1" stroke-dasharray="4 4" opacity="0.4"/>
  <line x1="410" y1="145" x2="410" y2="200" stroke="#10b981" stroke-width="1" stroke-dasharray="4 4" opacity="0.4"/>
  <line x1="570" y1="145" x2="570" y2="200" stroke="#10b981" stroke-width="1" stroke-dasharray="4 4" opacity="0.4"/>

  <!-- Bottom bar: MagenSec coverage -->
  <rect x="20" y="200" width="620" height="40" rx="8" fill="#0a2040" stroke="#3b82f6" stroke-width="1.5" opacity="0.8"/>
  <text x="330" y="218" text-anchor="middle" fill="#3b82f6" font-size="10" font-weight="700" font-family="Arial, sans-serif" letter-spacing="1">MAGENSEC PROTECTION LAYER</text>
  <text x="330" y="232" text-anchor="middle" fill="#64748b" font-size="9" font-family="Arial, sans-serif">Real-time AV · Vulnerability Detection · Behavior Analysis · MAGI AI</text>

  <!-- Arrow markers def -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#ef4444"/>
    </marker>
  </defs>
</svg>
